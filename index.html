<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>ESP32 Dashboard</title>

  <!-- Firebase (VERSIÓN COMPATIBLE SIMPLE) -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #0f172a;
      color: white;
      margin-top: 50px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      margin: 15px auto;
      width: 250px;
      border-radius: 10px;
    }

    .value {
      font-size: 30px;
      color: #22c55e;
    }
  </style>
</head>

<body>

<h1>📊 ESP32 Dashboard</h1>

<div class="card">
  <h2>🌡 Temperatura</h2>
  <div id="temp" class="value">--</div>
</div>

<div class="card">
  <h2>💧 Humedad</h2>
  <div id="hum" class="value">--</div>
</div>

<div class="card">
  <h2>🔢 Contador</h2>
  <div id="cont" class="value">--</div>
</div>

<script>
  // 🔥 TU CONFIG FIREBASE (DEBES PONER LA REAL DE "Project settings")
  const firebaseConfig = {
    apiKey: "TU_API_KEY",
    authDomain: "esp32-sensores-eb160.firebaseapp.com",
    databaseURL: "https://esp32-sensores-eb160-default-rtdb.firebaseio.com",
    projectId: "esp32-sensores-eb160"
  };

  firebase.initializeApp(firebaseConfig);

  const db = firebase.database();

  // 👇 ESTA ES TU RUTA REAL
  const ref = db.ref("ESP32");

  ref.on("value", (snapshot) => {
    const data = snapshot.val();

    console.log("DATA:", data);

    document.getElementById("temp").innerText = data.temperatura;
    document.getElementById("hum").innerText = data.humedad;
    document.getElementById("cont").innerText = data.contador;
  });
</script>

</body>
</html>
